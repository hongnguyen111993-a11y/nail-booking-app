<!DOCTYPE html>
<html>
<head>
  <title>紬ネイルサロン | Tsumugi Nail Salon</title>
</head>
<body>
  <h1>紬ネイルサロン<br>Tsumugi Nail Salon</h1>
  <input id="message" placeholder="Nhập tin nhắn..." />
  <button onclick="send()">Gửi</button>
  <div id="chat"></div>

  <script>
    function send() {
      const input = document.getElementById("message");
      const chat = document.getElementById("chat");
      chat.innerHTML += "<p>Bạn: " + input.value + "</p>";
      input.value = "";
      input.focus();
    }
  </script>
</body>
</html>
