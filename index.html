<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>紬ネイルサロン | Tsumugi Nail Salon</title>
</head>
<body>
  <h1>紬ネイルサロン<br>Tsumugi Nail Salon</h1>
  <input id="message" placeholder="Nhập tin nhắn..." />
  <button onclick="send()">Gửi</button>
  <div id="chat"></div>
<script>
const API_KEY = "YOUR_API_KEY";

async function send() {
  const input = document.getElementById("message");
  const chat = document.getElementById("chat");
  const text = input.value;

  chat.innerHTML += "<p><b>Khách:</b> " + text + "</p>";
  input.value = "";
  input.focus();

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + API_KEY,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: `
Bạn là lễ tân của 紬ネイルサロン (Tsumugi Nail Salon) tại Nhật.

Quy tắc:
- Nếu khách viết tiếng Nhật → trả lời tiếng Nhật lịch sự nhẹ.
- Nếu khách viết tiếng Việt → trả lời tiếng Việt.
- Khi khách muốn đặt lịch → hỏi rõ ngày, giờ, dịch vụ.
- Giờ làm việc: 10:00–19:00.
- Không dùng emoji.

Tin nhắn khách:
${text}
`
          }]
        }]
      })
    }
  );

  const data = await response.json();
  const reply = data.candidates[0].content.parts[0].text;

  chat.innerHTML += "<p><b>紬ネイルサロン:</b> " + reply + "</p>";
}
</script>
  
</body>
</html>
